<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorCode Pro</title>
    <script>
      // Set the theme class + exact background before first paint to avoid a
      // flash of the wrong scheme. Colors are generated at runtime, so we read
      // the surface color the app persisted (themeProvider) rather than compute
      // it here; falls back to neutral defaults on first visit.
      ;(function () {
        try {
          var t = localStorage.getItem('theme') || 'dual'
          if (t === 'system') t = 'dual'
          var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          var el = document.documentElement
          el.classList.add(dark ? 'dark' : 'light')
          el.style.colorScheme = dark ? 'dark' : 'light'
          el.style.background = localStorage.getItem(dark ? 'bg-dark' : 'bg-light') || (dark ? '#1d1d1d' : '#fcfcfc')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
